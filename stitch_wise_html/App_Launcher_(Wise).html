<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Geist';
            src: url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        }
        body {
            font-family: 'Geist', sans-serif;
            background-color: #ffffff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#22c55e",
                      "on-primary": "#ffffff",
                      "primary-container": "#16a34a",
                      "on-primary-container": "#ffffff",
                      "secondary": "#374151",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#f3f4f6",
                      "on-secondary-container": "#1f2937",
                      "tertiary": "#22c55e",
                      "on-tertiary": "#ffffff",
                      "background": "#ffffff",
                      "on-background": "#111827",
                      "surface": "#ffffff",
                      "on-surface": "#111827",
                      "surface-variant": "#f9fafb",
                      "on-surface-variant": "#4b5563",
                      "outline": "#d1d5db",
                      "outline-variant": "#e5e7eb",
                      "surface-container": "#ffffff",
                      "surface-container-low": "#fafafa"
              },
              "borderRadius": {
                      "DEFAULT": "0.5rem",
                      "lg": "0.75rem",
                      "xl": "1rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Geist"],
                      "body": ["Geist"],
                      "label": ["Geist"]
              }
            },
          },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- App Launcher Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative overflow-hidden">
<!-- Central Identity Cluster -->
<div class="w-full max-w-md flex flex-col items-center text-center z-10">
<!-- Logo Section -->
<div class="mb-12 relative">
<div class="relative flex items-center justify-center w-28 h-28 bg-surface-container rounded-3xl border border-outline-variant shadow-sm">
<span class="material-symbols-outlined text-primary text-6xl" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<!-- Decorative overlay -->
<div class="absolute bottom-4 right-4 bg-primary w-7 h-7 rounded-full flex items-center justify-center border-2 border-surface">
<span class="material-symbols-outlined text-on-primary text-[16px]" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
<!-- Typography Header -->
<div class="mb-10 space-y-3">
<h1 class="text-4xl font-headline font-black tracking-tight text-on-background">
                    Fresh Track AI
                </h1>
<p class="text-on-surface-variant text-lg font-medium max-w-[280px] mx-auto">
                    Precision food tracking for high-performance living.
                </p>
</div>
<!-- Action Button -->
<div class="w-full max-w-xs space-y-8">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-4 px-6 rounded-full transition-all duration-300 transform active:scale-95 shadow-lg shadow-primary/10 flex items-center justify-center gap-2">
<span class="text-lg">Launch App</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Quick Actions / Features (No Labels) -->
<div class="flex items-center justify-center gap-10 pt-8 border-t border-outline-variant">
<div class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-3xl" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-3xl" data-icon="analytics">analytics</span>
</div>
<div class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-3xl" data-icon="cloud_sync">cloud_sync</span>
</div>
</div>
</div>
</div>
<!-- Subtle Footer Branding -->
<div class="absolute bottom-10 text-center">
<p class="text-[11px] font-bold text-on-surface-variant/40 tracking-[0.2em] uppercase">
                Powered by Obsidian Core
            </p>
</div>
</main>
</body></html>
