<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fresh Track AI - Add Missing Item</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#22c55e",
                    "on-primary": "#ffffff",
                    "background": "#ffffff",
                    "on-background": "#1a1a1a",
                    "surface": "#ffffff",
                    "on-surface": "#1a1a1a",
                    "surface-variant": "#f3f4f6",
                    "on-surface-variant": "#4b5563",
                    "outline": "#e5e7eb",
                    "outline-variant": "#d1d5db"
            },
            "borderRadius": {
                    "DEFAULT": "8px",
                    "lg": "12px",
                    "xl": "16px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "sans-serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white border-b border-outline flex justify-between items-center px-4 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary font-bold">inventory_2</span>
<h1 class="font-headline tracking-tight text-on-surface font-bold text-lg">Fresh Track AI</h1>
</div>
<button class="hover:bg-surface-variant transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-4 max-w-2xl mx-auto">
<header class="mb-8 mt-4">
<h2 class="text-2xl font-bold tracking-tight text-on-surface mb-2">Add Missing Item</h2>
<p class="text-on-surface-variant text-sm">Manually catalog items that weren't captured during your last scan.</p>
</header>
<!-- Form Section -->
<div class="grid grid-cols-1 gap-6">
<!-- Item Basic Info Card -->
<section class="bg-surface rounded-xl border border-outline p-6">
<div class="space-y-5">
<div>
<label class="block text-sm font-semibold text-on-surface mb-1.5" for="item-name">Item Name</label>
<input class="w-full bg-surface-variant border-transparent rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white border focus:border-outline-variant outline-none transition-all placeholder:text-on-surface-variant/50" id="item-name" placeholder="e.g. Organic Baby Spinach" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-on-surface mb-1.5" for="quantity">Quantity</label>
<input class="w-full bg-surface-variant border-transparent rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white border focus:border-outline-variant outline-none transition-all placeholder:text-on-surface-variant/50" id="quantity" placeholder="e.g. 2 packs" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1.5" for="category">Category</label>
<div class="relative">
<select class="w-full bg-surface-variant border-transparent rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white border focus:border-outline-variant outline-none transition-all appearance-none" id="category">
<option>Produce</option>
<option>Dairy &amp; Eggs</option>
<option>Meat &amp; Seafood</option>
<option>Pantry</option>
<option>Frozen</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-xl">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface mb-1.5" for="expiry">Expiry Date</label>
<div class="relative">
<input class="w-full bg-surface-variant border-transparent rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white border focus:border-outline-variant outline-none transition-all" id="expiry" type="date"/>
</div>
</div>
</div>
</section>
<!-- Nutritional Info Section -->
<section class="bg-surface rounded-xl border border-outline p-6">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">nutrition</span>
<h3 class="text-base font-bold text-on-surface">Nutritional Info</h3>
</div>
<div class="space-y-4">
<textarea class="w-full bg-surface-variant border-transparent rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white border focus:border-outline-variant outline-none transition-all placeholder:text-on-surface-variant/50 resize-none" id="nutritional-info" placeholder="Enter calories, macros, or scan label text..." rows="3"></textarea>
<div class="flex items-center gap-4 p-4 bg-surface-variant rounded-lg">
<div class="w-12 h-12 rounded-lg bg-white border border-outline flex items-center justify-center overflow-hidden">
<img alt="label placeholder" class="w-full h-full object-cover grayscale opacity-60" data-alt="close-up of a nutritional facts label on a food package with clean black text on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPg5eu0TqDBl1rIOA-11cVHiWlpit71vtEqEIKr37GI7ko9MClxBODhBzIPhR4RLEO-GlOKzgtppmjrsf18EpCImnGKyIbAPDlhxAq-9K-W3UD6A5e5WCr_lih61dMJXC8hktlJQZ_tPTifUcfbUCFe76d_Jx8O_pvgR5flUxnS6-mfuBtSAbLLw72tXGWe0oa21olP__ilNPkc_FrBHCNh47roMwwEcGB8b1IgyvUpBHMjRX19QRkglI85pSH_DbJPnPfB-WMwQ"/>
</div>
<div class="flex-1">
<p class="text-sm font-semibold text-on-surface">Quick Scan Label</p>
<p class="text-xs text-on-surface-variant">Auto-fill info using your camera</p>
</div>
<button class="bg-white border border-outline text-on-surface hover:bg-white p-2.5 rounded-lg transition-colors shadow-sm active:bg-surface-variant">
<span class="material-symbols-outlined text-xl">add_a_photo</span>
</button>
</div>
</div>
</section>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-lg active:scale-[0.98] transition-transform duration-150 flex items-center justify-center gap-2 mb-12 shadow-sm">
<span class="material-symbols-outlined">add_circle</span>
                Add Item
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-white border-t border-outline flex justify-around items-center h-20 pb-safe px-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-[11px] font-semibold mt-0.5">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">document_scanner</span>
<span class="font-label text-[11px] font-semibold mt-0.5">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">restaurant_menu</span>
<span class="font-label text-[11px] font-semibold mt-0.5">Recipe</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label text-[11px] font-semibold mt-0.5">List</span>
</a>
</nav>
</body></html>
